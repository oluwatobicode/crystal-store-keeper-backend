name: Debug SSH

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 2m
          script: |
            pm2 list
            pm2 logs crystal-store-keeper --lines 50
            sudo systemctl status nginx
            cd /home/ubuntu/crystal-store-keeper-backend
            npm run build
            pm2 restart crystal-store-keeper
